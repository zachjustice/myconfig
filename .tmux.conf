# Vim-like pane movement
bind j select-pane -D
bind k select-pane -U
bind h select-pane -L
bind l select-pane -R

# Sane pane splitting (with current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes by pressing ctrl-b + HJKL for incremental resize
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# toggle synchronize panes
bind x setw synchronize-panes

# white for inactive panes
set -g pane-border-style fg=white

# blue for active panes
set -g pane-active-border-style fg=cyan

# scroll through history with your mouse, click to focus panes
set -g mouse on

# Best-practice settings
set -s escape-time 10
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -g renumber-windows on
set -g focus-events on
setw -g mode-keys vi

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
